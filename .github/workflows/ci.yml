name: CI
on: [push] # trigger
permissions:
  contents: read # min perms
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: spreadsheet-linux
            binary: build/spreadsheet
          - os: windows-latest
            artifact: spreadsheet-windows
            binary: build/Release/spreadsheet.exe
          - os: macos-latest
            artifact: spreadsheet-macos
            binary: build/spreadsheet
    runs-on: ${{ matrix.os }} # runner
    steps:
      - uses: actions/checkout@v4 # checkout
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release # config
      - name: Build
        run: cmake --build build --config Release # build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
