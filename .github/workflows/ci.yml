name: CI
on: [push,pull_request] # trigger
permissions:
  contents: read # min perms
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest,windows-latest,macos-latest] # platforms
    runs-on: ${{ matrix.os }} # runner
    steps:
      - uses: actions/checkout@v4 # checkout
      - name: X11 deps
        if: runner.os == 'Linux' # linux only
        run: sudo apt-get update && sudo apt-get install -y libx11-dev # install
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release # config
      - name: Build
        run: cmake --build build --config Release # build
